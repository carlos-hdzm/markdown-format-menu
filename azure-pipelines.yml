trigger:
  branches:
    include:
    - main
  tags:
    include:
    - v*

stages:
- stage: Build_and_Test
  displayName: 'Build and Test'
  jobs:
  - job: Run_tests
    displayName: 'Run tests on multiple platforms'
    strategy:
      matrix:
        linux:
          imageName: 'ubuntu-latest'
        mac:
          imageName: 'macos-latest'
        windows:
          imageName: 'windows-latest'

    pool:
      vmImage: $(imageName)

    steps:

    - task: UseNode@1
      inputs:
        version: '24.x'
      displayName: 'Install Node.js'

    - bash: |
        /usr/bin/Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
        echo ">>> Started xvfb"
      displayName: Start xvfb
      condition: and(succeeded(), eq(variables['Agent.OS'], 'Linux'))

    - bash: |
        echo ">>> Compile vscode-test"
        npm install && npm run compile
        echo ">>> Compiled vscode-test"
        echo ">>> Run integration test"
        npm install && npm run compile && npm run test
      displayName: Run Tests
      env:
        DISPLAY: ':99.0'

  - job: Publish
    steps:
    # Install VS Code Extension Manager (vsce >= v2.26.1 needed) and dependencies
    - script: |
        npm install -g @vscode/vsce
        npm install
      displayName: "Install vsce and dependencies"

    # Publish
    - task: AzureCLI@2
      displayName: 'Publish using managed identity'
      inputs:
        azureSubscription: mfm-service-connection
        scriptType: pscore
        scriptLocation: inlineScript
        inlineScript: |
          vsce publish --azure-credential